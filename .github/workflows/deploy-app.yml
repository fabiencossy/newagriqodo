# ============================================================================
# Deploy — app React vers le VPS Infomaniak
# ============================================================================
# Déclenchement manuel (workflow_dispatch) ou tag v* pour aller en prod.
#
# Prérequis côté repo GitHub (Settings -> Secrets and variables -> Actions) :
#   - VPS_HOST           : 83.228.247.77
#   - VPS_USER           : ubuntu
#   - VPS_SSH_KEY        : clé privée SSH (format OpenSSH) avec accès au VPS
#   - SUPABASE_URL       : https://supabase.newagri.qodo.ch
#   - SUPABASE_ANON_KEY  : (clé JWT anon générée par bootstrap.sh)
#
# Côté VPS : un répertoire /var/www/newagri-app servi par Caddy (cf.
# infra/supabase/Caddyfile à compléter avec un site newagri.qodo.ch).
# ============================================================================

name: Deploy App

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    environment:
      name: production
      url: https://newagri.qodo.ch
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Build (avec env Supabase prod)
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync dist/ vers VPS
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/newagri-app/
