<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1f7a4d" />
    <meta name="color-scheme" content="light" />

    <title>NewagriQodo</title>
    <meta
      name="description"
      content="Gestion d'exploitation agricole : parcelles, carnet des champs, plan de fumure. Données hébergées en Suisse."
    />

    <!-- Icônes -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/qodo-mark.svg" color="#1f7a4d" />

    <!-- PWA / installable -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS standalone (plein écran sans barre Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="NewagriQodo" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Empêche le pinch-zoom natif iOS qui zoome le DOM -->
    <style>
      html,
      body {
        touch-action: manipulation;
        -webkit-touch-callout: none;
      }
      /* Safe area pour l'encoche iPhone */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
