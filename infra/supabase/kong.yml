# ============================================================================
# Kong — Déclarative config pour Supabase self-host
# ============================================================================
# Route /auth, /rest, /realtime, /storage vers les services internes.
# Authentification par clé API (anon ou service_role) via header `apikey`
# ou query-string `?apikey=`. Le JWT bearer reste géré par chaque service.
# ============================================================================

_format_version: '2.1'
_transform: true

consumers:
  - username: anon
    keyauth_credentials:
      - key: $SUPABASE_ANON_KEY
  - username: service_role
    keyauth_credentials:
      - key: $SUPABASE_SERVICE_KEY

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

services:
  # ---- Auth (GoTrue) ----
  - name: auth-v1-open
    url: http://auth:9999/verify
    routes:
      - name: auth-v1-open
        strip_path: true
        paths:
          - /auth/v1/verify
    plugins:
      - name: cors
        config:
          origins:
            - https://newagri.qodo.ch
            - http://localhost:5173
          credentials: true
  - name: auth-v1-open-callback
    url: http://auth:9999/callback
    routes:
      - name: auth-v1-open-callback
        strip_path: true
        paths:
          - /auth/v1/callback
    plugins:
      - name: cors
        config:
          origins:
            - https://newagri.qodo.ch
            - http://localhost:5173
          credentials: true
  - name: auth-v1-open-authorize
    url: http://auth:9999/authorize
    routes:
      - name: auth-v1-open-authorize
        strip_path: true
        paths:
          - /auth/v1/authorize
    plugins:
      - name: cors
        config:
          origins:
            - https://newagri.qodo.ch
            - http://localhost:5173
          credentials: true
  - name: auth-v1
    _comment: 'GoTrue — auth principal (signup, login, recover, etc.)'
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
        config:
          origins:
            - https://newagri.qodo.ch
            - http://localhost:5173
          credentials: true
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  # ---- REST (PostgREST) ----
  - name: rest-v1
    _comment: 'PostgREST — accès tables avec RLS'
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
        config:
          origins:
            - https://newagri.qodo.ch
            - http://localhost:5173
          credentials: true
      - name: key-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  # ---- Realtime (websockets) ----
  - name: realtime-v1
    _comment: 'Realtime — subscriptions Postgres'
    url: http://realtime:4000/socket/
    routes:
      - name: realtime-v1-all
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
        config:
          origins:
            - https://newagri.qodo.ch
            - http://localhost:5173
          credentials: true
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  # ---- Storage ----
  - name: storage-v1
    _comment: 'Storage — uploads photos / exports'
    url: http://storage:5000/
    routes:
      - name: storage-v1-all
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors
        config:
          origins:
            - https://newagri.qodo.ch
            - http://localhost:5173
          credentials: true

  # ---- Studio (admin UI) ----
  - name: meta
    _comment: 'Postgres-meta — backend du Studio'
    url: http://meta:8080/
    routes:
      - name: meta-all
        strip_path: true
        paths:
          - /pg/
    plugins:
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
